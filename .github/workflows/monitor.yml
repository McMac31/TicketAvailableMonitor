name: Monitor de Entradas Bataplan

on:
  schedule:
    - cron: '*/5 * * * *' # Se ejecuta cada 5 minutos
  workflow_dispatch: # Te permite ejecutarlo manualmente desde un botón

jobs:
  check_tickets:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar el monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python monitor.py

      - name: Guardar el estado (last_state.json)
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add last_state.json
          # Solo hace commit si el archivo ha cambiado
          git diff --quiet && git diff --staged --quiet || (git commit -m "Bot: Actualiza estado de entradas" && git push)